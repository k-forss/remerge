# remerge server configuration
#
# Copy this to /etc/remerge/server.toml or mount it into the container.
# All settings can also be set via REMERGE_* environment variables.

# Directory where binary packages are stored.
# This is also served over HTTP as the binhost.
# Back this up if you want to preserve built packages across host loss.
binpkg_dir = "/var/cache/remerge/binpkgs"

# Base URL that clients use to reach the binhost repository.
# Set this to your server's public address.
binhost_url = "http://localhost:7654/binpkgs"

# Docker socket path.
docker_socket = "unix:///var/run/docker.sock"

# Prefix for worker Docker images.
# Images are tagged as: <prefix>:<arch>-<profile>-gcc<version>
worker_image_prefix = "remerge-worker"

# Maximum concurrent worker containers.
max_workers = 4

# Maximum number of non-terminal workorders accepted at once.
# Additional submissions return HTTP 503 until capacity frees up.
max_active_workorders = 256

# Maximum JSON request body size in bytes.
# Oversized workorder submissions are rejected before parsing.
request_body_size_bytes = 2097152

# Maximum build duration in seconds.
# Set to 0 to disable, but keeping a finite timeout is strongly recommended.
build_timeout_secs = 14400

# Seconds to keep idle worker containers before removing them.
# The reaper preserves the most recently used image per
# (CHOST, profile, GCC) tuple and only evicts duplicates.
worker_idle_timeout = 3600

# Worker container memory limit in bytes.
worker_memory_bytes = 4294967296

# Worker container CPU share weight.
worker_cpu_shares = 1024

# Docker network mode for worker containers.
# Use "none" if you provide all sources and overlays out-of-band.
worker_network_mode = "bridge"

# Path inside worker containers where binpkgs are written.
# This is bind-mounted from the host's binpkg_dir.
worker_binpkg_mount = "/var/cache/binpkgs"

# Path to the host's repo tree mirror.
# When set, this directory is bind-mounted read-only into workers and the
# per-build sync step is skipped.
# repos_dir = "/var/db/repos"

# ── Build tuning ─────────────────────────────────────────────────
# Number of parallel emerge jobs (-j flag).
# Omit or set to 0 to auto-detect from CPU count.
# parallel_jobs = 8

# Maximum system load average (-l flag).
# Omit or set to 0 to auto-detect from CPU count.
# load_average = 8.0

# ── State & retention ───────────────────────────────────────────
# Directory for persisting workorders, results, and client registry
# across server restarts.
# Back this up before upgrades if you want rollback to restore state cleanly.
state_dir = "/var/lib/remerge"

# How many hours to keep completed/failed workorders before automatic
# eviction.
retention_hours = 24

# Maximum number of completed/failed workorders to keep in memory.
# Oldest terminal entries are evicted first when the cap is exceeded.
# Set to 0 to disable (rely only on retention_hours).
max_retained_workorders = 1000

# Snapshot retention grace window in hours.
# Unreferenced snapshot data older than this becomes eligible for floor-aware
# cleanup.
snapshot_cache_grace_period_hours = 168

# Snapshot hard-delete eligibility in hours.
# Data older than this is reclaimed first when cleanup is needed, but cleanup
# still stops once retained snapshot data is at or below the retained-size
# floor.
snapshot_cache_hard_delete_hours = 720

# Minimum retained snapshot bytes.
# Cleanup of unreferenced snapshot blobs/trees stops once retained snapshot
# data is back at or below this floor.
snapshot_min_retained_bytes = 10737418240

# ── Observability ────────────────────────────────────────────────
# Enable JSON-formatted structured log output.
# Useful for log aggregation pipelines (ELK, Loki, etc.).
log_json = false

# Disk usage warning threshold for the binpkg directory, in bytes.
# A warning log + metric is emitted when exceeded.  Set to 0 to disable.
# Default: 10 GiB (10737418240).
binpkg_disk_warn_bytes = 10737418240

# ── Worker binary ───────────────────────────────────────────────
# Path to the remerge-worker binary on the host.
# The server now fails fast at startup if this path is missing or unreadable.
# Build/install remerge-worker first, then point this at the installed binary.
# A typical source-build path is target/release/remerge-worker; a typical
# packaged install path is /usr/local/bin/remerge-worker.
# worker_binary = "/usr/local/bin/remerge-worker"

# Optional root image for cached worker base layers.
# The server builds worker images in two steps:
#   1. a cached base layer per (CHOST, profile, GCC)
#   2. a thin runtime layer that injects remerge-worker
# Set this to a pre-synced stage3 or other curated base image if you want to
# avoid `emerge --sync` while building cached worker base layers.
# worker_base_image = "ghcr.io/k-forss/remerge/test-stage3:latest"

# Force cached worker base layers to skip the initial sync step.
# Safe only when worker_base_image or the chosen base already has a usable
# Portage tree.
skip_worker_sync = false

# ── Native TLS (optional) ───────────────────────────────────────
# For direct HTTPS without a reverse proxy.
# Omit the entire section to serve plain HTTP.
#
# [tls]
# cert = "/etc/remerge/cert.pem"
# key = "/etc/remerge/key.pem"

# ── Binary package OpenPGP signing (optional) ────────────────────
# When configured, worker containers sign all .gpkg packages with
# the specified GPG key.  The keyring directory is mounted read-only
# into each worker.
#
# See: https://wiki.gentoo.org/wiki/Binary_package_guide#Binary_package_OpenPGP_signing
#
# [signing]
# gpg_key = "0x1234567890ABCDEF"
# gpg_home = "/var/cache/remerge/gnupg"
# Back up gpg_home if the signing key is not recoverable elsewhere.
# The server validates this key at startup and exits if the secret key is
# missing from gpg_home.

# ── Authentication (optional) ───────────────────────────────────
# Three modes: "none" (default), "mtls", "mixed".
# Endpoint exposure is derived from this mode:
#   none  -> /metrics public, /binpkgs public
#   mtls  -> /metrics protected, /binpkgs protected
#   mixed -> /metrics protected, /binpkgs public
#
# The reverse proxy must strip any inbound certificate header and inject the
# configured one only after successful client certificate verification.
# Rate limiting is expected at the reverse proxy layer, especially for
# POST /api/v1/workorders, GET /metrics, and GET /binpkgs/...
# remerge intentionally does not enforce a server-side package-category
# allowlist; restrict access with auth and reverse-proxy policy instead.
#
# [auth]
# mode = "none"
# cert_header = "X-Client-Cert-Fingerprint"
#
# [[auth.clients]]
# fingerprint = "SHA256:..."
# client_id = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
# role = "main"
# label = "my workstation"
