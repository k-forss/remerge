# Create a release tag when an RC branch is merged to main.
#
# This workflow runs when a pull request from an `rc-*` branch is merged
# into `main`.  It extracts the version from the branch name and creates
# an annotated tag `v<version>`, which triggers the Release workflow.

name: Tag Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    name: Create release tag
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'rc-')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version and create tag
        run: |
          VERSION="${{ github.event.pull_request.head.ref }}"
          VERSION="${VERSION#rc-}"
          echo "::notice::Creating tag v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin "v${VERSION}"
