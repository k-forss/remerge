# Create a release tag and trigger the release pipeline when an RC
# branch is merged to main.
#
# This workflow runs when a pull request from an `rc-*` branch is merged
# into `main`.  It extracts the version from the branch name, creates
# a signed annotated tag `v<version>` via the GitHub API, and dispatches
# the Release workflow to build binaries and publish a GitHub Release.

name: Tag Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  actions: write

jobs:
  tag:
    name: Create release tag
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'rc-')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          VERSION="${{ github.event.pull_request.head.ref }}"
          VERSION="${VERSION#rc-}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "::notice::Creating tag v${VERSION}"

      - name: Create signed release tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          COMMIT_SHA=$(git rev-parse HEAD)

          # Create annotated tag object via API (GitHub signs it)
          TAG_SHA=$(gh api "repos/${{ github.repository }}/git/tags" \
            -f tag="v${VERSION}" \
            -f message="Release v${VERSION}" \
            -f object="${COMMIT_SHA}" \
            -f type="commit" \
            --jq '.sha')

          # Create tag ref pointing to the tag object
          gh api "repos/${{ github.repository }}/git/refs" \
            -f ref="refs/tags/v${VERSION}" \
            -f sha="${TAG_SHA}"

          echo "::notice::Created signed tag v${VERSION} at ${COMMIT_SHA}"

      - name: Dispatch release workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release.yml \
            --ref "v${{ steps.version.outputs.version }}" \
            -f tag="v${{ steps.version.outputs.version }}"

      - name: Dispatch Docker build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run docker.yml \
            --ref "v${{ steps.version.outputs.version }}"
