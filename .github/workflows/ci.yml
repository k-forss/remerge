name: CI

on:
  push:
    branches: [main, "rc-*"]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install test prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gnupg

      # 8.5: Install nextest for test duration tracking and JUnit output.
      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Run tests (nextest)
        run: cargo nextest run --workspace --profile ci

      - name: Check duration baseline
        run: |
          python3 scripts/test_duration_baseline.py \
            --junit target/nextest/ci/junit.xml \
            --baseline .config/test-duration-baseline.json \
            --minimum-duration 0.1 \
            --minimum-regression 0.5 \
            --threshold 1.25 \
            --report target/nextest/ci/duration-report.txt

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            target/nextest/ci/junit.xml
            target/nextest/ci/duration-report.txt
          if-no-files-found: ignore

  fuzz:
    name: Fuzz Smoke Test
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2
        with:
          key: fuzz-nightly

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz

      - name: Verify cargo-fuzz is available
        run: rustup run nightly cargo fuzz --help >/dev/null

      - name: Run parser and arg-filter fuzzers
        working-directory: fuzz
        run: |
          HOST_TARGET=$(rustup run nightly rustc -vV | sed -n 's/^host: //p')
          rustup run nightly cargo fuzz run make_conf_vars --target "$HOST_TARGET" --sanitizer none -- -max_total_time=15
          rustup run nightly cargo fuzz run emerge_arg_filtering --target "$HOST_TARGET" --sanitizer none -- -max_total_time=15

  full-stack-test:
    name: Full Stack Test
    runs-on: ubuntu-latest
    needs: [check, test, fuzz]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install test prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gnupg

      - name: Prepare test stage3 image
        run: |
          image="ghcr.io/${{ github.repository }}/test-stage3:latest"
          if docker pull "$image"; then
            docker tag "$image" gentoo/stage3:latest
            docker tag "$image" remerge/test-stage3:latest
            echo "Using prebuilt $image for full-stack tests"
          else
            echo "::warning::Could not pull $image. Full-stack tests will trigger the explicit local fallback build in tests/common/server.rs."
          fi

      - name: Build worker binary for queue-driven E2E tests
        run: cargo build -p remerge-worker

      - name: Run full stack tests
        run: cargo test --workspace --features integration,e2e
