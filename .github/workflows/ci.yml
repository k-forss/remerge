name: CI

on:
  push:
    branches: [main, "rc-*"]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # 8.5: Install nextest for test duration tracking and JUnit output.
      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Run tests (nextest)
        run: cargo nextest run --workspace --profile ci

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [check, test]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run integration tests
        run: cargo test --workspace --features integration

  # E2E test: runs on push to main, covers Phases 4-7 with Docker + stage3.
  e2e-test:
    name: E2E Test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [check, test]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # 8.2: Pull the pre-built test stage3 image from GHCR instead of
      # rebuilding it. test-image.yml builds and pushes on Dockerfile change.
      - name: Pull test stage3 image from GHCR
        run: |
          docker pull ghcr.io/k-forss/remerge/test-stage3:latest || true
          docker tag ghcr.io/k-forss/remerge/test-stage3:latest gentoo/stage3:latest || true

      - name: Run E2E tests
        run: cargo test --workspace --features integration,e2e

  # Smoke test: runs on every PR, covers Phases 1-3 (fast, no Docker).
  smoke-test:
    name: Smoke Test (Phases 1-3)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run smoke tests (types + CLI + worker setup)
        run: |
          cargo test -p remerge-integration-tests --test types_test
          cargo test -p remerge-integration-tests --test cli_portage_test
          cargo test -p remerge-integration-tests --test worker_setup_test
          cargo test -p remerge-integration-tests --test error_test
