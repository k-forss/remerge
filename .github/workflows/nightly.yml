# Build the latest remerge CLI binary from main and publish it to a
# rolling "nightly" pre-release on GitHub.
#
# This powers the remerge-bin-9999 live ebuild, which downloads from:
#   https://github.com/k-forss/remerge/releases/download/nightly/remerge-nightly-<arch>-linux.tar.gz
#
# Only the latest build is kept — each push to main replaces the
# previous nightly release.

name: Nightly

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch: {}

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            target: x86_64-unknown-linux-gnu
            cross: false
          - arch: arm64
            target: aarch64-unknown-linux-gnu
            cross: true

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: nightly-${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@cross

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --bin remerge
          else
            cargo build --release --target ${{ matrix.target }} --bin remerge
          fi

      - name: Package
        run: |
          tar czf remerge-nightly-${{ matrix.arch }}-linux.tar.gz \
            -C target/${{ matrix.target }}/release remerge

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.arch }}
          path: "*.tar.gz"

  publish:
    name: Update nightly release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum *.tar.gz > remerge-nightly-SHA256SUMS.txt

      - name: Update nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete the existing nightly release and its tag so we start fresh.
          gh release delete nightly --yes --cleanup-tag 2>/dev/null || true
          # Also force-delete the tag in case cleanup-tag didn't remove it
          # (e.g. the release was already gone but the tag lingered).
          git tag -d nightly 2>/dev/null || true
          git push origin :refs/tags/nightly 2>/dev/null || true

          # Write release notes to a file to avoid shell quoting issues.
          cat > /tmp/nightly-notes.md <<EOF
          Rolling nightly build from the \`main\` branch.

          **Last updated:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          **Commit:** [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

          These builds are for use with the \`remerge-bin-9999\` live ebuild.
          They are automatically replaced on each push to \`main\`.
          EOF

          ls -la *.tar.gz *-SHA256SUMS.txt

          gh release create nightly \
            --target "${{ github.sha }}" \
            --title "Nightly (latest main)" \
            --notes-file /tmp/nightly-notes.md \
            --prerelease \
            --latest=false \
            *.tar.gz *-SHA256SUMS.txt

      - name: Generate overlay Manifest
        run: |
          python3 -c "
          import hashlib, pathlib

          manifest_dir = pathlib.Path('overlay/app-portage/remerge-bin')
          lines = []
          for tarball in sorted(pathlib.Path('.').glob('remerge-nightly-*-linux.tar.gz')):
              data = tarball.read_bytes()
              b2 = hashlib.blake2b(data).hexdigest()
              s5 = hashlib.sha512(data).hexdigest()
              lines.append(f'DIST {tarball.name} {len(data)} BLAKE2B {b2} SHA512 {s5}')
          (manifest_dir / 'Manifest').write_text('\n'.join(lines) + '\n')
          print(f'Wrote {len(lines)} entries to Manifest')
          "

      - name: Commit Manifest update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add overlay/app-portage/remerge-bin/Manifest
          if git diff --cached --quiet; then
            echo "::notice::Manifest unchanged"
          else
            git commit -m "chore: update remerge-bin nightly Manifest [skip ci]"
            git push origin main
          fi
